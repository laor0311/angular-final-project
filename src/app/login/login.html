<main class="bg-login min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                    <div class="row g-0 align-items-center">
                        <div class="col-md-6 d-none d-md-block">
                            <div class="p-4 p-lg-5">
                                <div class="row gy-3">
                                    <div class="col-12">
                                        <img class="img-fluid imglogin" src="img/login.png">
                                    </div>
                                    <div class="col-12 text-center">
                                        <a href="#" class="small fw-semibold text-decoration-underline link-dark ">
                                            Create new account
                                        </a>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="col-md-6">
                            <div class="p-4 p-lg-5">
                                <h1 class="display-6 fw-bold ms-2 mb-4 title">Login Form</h1>

                                <form (ngSubmit)="onSubmit()" novalidate>

                                    <div class="mb-3 me-3">
                                        <div class="input-group input-underline">
                                            <span class="input-group-text bg-transparent border-0 pe-2">
                                                <i class="bi bi-person-fill"></i>
                                            </span>
                                            <input type="text" class="form-control border-0 shadow-none"
                                                placeholder="Username" aria-label="Username" name="username"
                                                [(ngModel)]="username" autocomplete="username" required>
                                        </div>
                                    </div>

                                    <div class="mb-3 me-3">
                                        <div class="input-group input-underline">
                                            <span class="input-group-text bg-transparent border-0 pe-2">
                                                <i class="bi bi-key-fill"></i>
                                            </span>
                                            <input type="password" class="form-control border-0 shadow-none"
                                                placeholder="Password" aria-label="Password" name="password"
                                                [(ngModel)]="password" autocomplete="current-password" required>
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-4">

                                        <div class="form-check ms-2">
                                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                            <label class="form-check-label" for="rememberMe">Remember me</label>
                                        </div>

                                        <a href="#" class="text-decoration-underline me-3">Forgot password?</a>

                                    </div>
                                    <div class="d-grid d-sm-outline ms-2 me-3">
                                        <button type="submit" class="btn btn-primary px-5 py-2 fw-semibold" [disabled]="isSubmitting">
                                            {{ isSubmitting ? 'Logging in...' : 'Log in' }}
                                        </button>
                                    </div>

                                    <div class="ms-2 me-3 mt-3 text-danger fw-semibold" *ngIf="errorMessage">
                                        {{ errorMessage }}
                                    </div>
                                </form>

                                <div class="mt-3 pt-2">
                                    <div class=" text-muted small mt-2 mb-2 fw-semibold text-center">OR</div>
                                    <div class="d-flex gap-2 justify-content-center mt-4">
                                        <a class="btn btn-icon btn-facebook " href="#" aria-label="Login with Facebook">
                                            <i class="bi bi-facebook" aria-hidden="true"></i>
                                        </a>
                                        <a class="btn btn-icon btn-twitter" href="#" aria-label="Login with Twitter/X">
                                            <i class="bi bi-twitter" aria-hidden="true"></i>
                                        </a>
                                        <a class="btn btn-icon btn-google" href="#" aria-label="Login with Google">
                                            <i class="bi bi-google" aria-hidden="true"></i>
                                        </a>
                                    </div>
                                </div>


                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
